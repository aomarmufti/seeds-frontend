name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check every inline <script> block in index.html
        run: node .github/scripts/check-inline-scripts.js
